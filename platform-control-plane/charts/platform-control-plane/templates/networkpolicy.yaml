{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "platform-control-plane.fullname" . }}
  labels:
    {{- include "platform-control-plane.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "platform-control-plane.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - {}
{{- end }}
